server {
    listen 80;
    server_name aiassistant.tlcengine.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aiassistant.tlcengine.com;

    # SSL certs (certbot will manage these)
    ssl_certificate /etc/letsencrypt/live/aiassistant.tlcengine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiassistant.tlcengine.com/privkey.pem;

    location / {
        proxy_pass http://localhost:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Twilio voice streams
    location /voice-stream {
        proxy_pass http://localhost:8005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
