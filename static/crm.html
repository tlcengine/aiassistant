<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - CertiHomes AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh;
        }

        /* Nav */
        nav {
            background: #1e293b; padding: 0.75rem 2rem; display: flex;
            align-items: center; gap: 2rem; border-bottom: 1px solid #334155;
        }
        nav .brand {
            font-size: 1.25rem; font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        nav a {
            color: #94a3b8; text-decoration: none; font-size: 0.875rem;
            padding: 0.5rem 0; border-bottom: 2px solid transparent;
        }
        nav a:hover, nav a.active { color: #e2e8f0; border-color: #3b82f6; }
        nav .spacer { flex: 1; }
        .nav-actions { display: flex; gap: 0.5rem; }

        /* Layout */
        .layout { display: flex; height: calc(100vh - 52px); }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 1.5rem; }

        /* Stats cards */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            padding: 1.25rem;
        }
        .stat-card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
        .stat-card .value.blue { color: #38bdf8; }
        .stat-card .value.green { color: #22c55e; }
        .stat-card .value.yellow { color: #eab308; }
        .stat-card .value.purple { color: #a78bfa; }

        /* Sidebar filters */
        .filter-section { padding: 1rem; border-bottom: 1px solid #334155; }
        .filter-section h3 { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.75rem; }
        .filter-btn {
            display: block; width: 100%; text-align: left; background: transparent;
            border: none; color: #94a3b8; padding: 0.5rem 0.75rem; border-radius: 6px;
            font-size: 0.875rem; cursor: pointer;
        }
        .filter-btn:hover { background: #334155; color: #e2e8f0; }
        .filter-btn.active { background: #3b82f6; color: white; }
        .filter-btn .count { float: right; font-size: 0.75rem; }

        /* Search */
        .search-bar {
            padding: 1rem; border-bottom: 1px solid #334155;
        }
        .search-bar input {
            width: 100%; background: #0f172a; border: 1px solid #475569;
            border-radius: 8px; padding: 0.625rem 0.875rem; color: #e2e8f0;
            font-size: 0.875rem; outline: none;
        }
        .search-bar input:focus { border-color: #3b82f6; }
        .search-bar input::placeholder { color: #64748b; }

        /* Contact list / table */
        .contact-table { width: 100%; border-collapse: collapse; }
        .contact-table th {
            text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem;
            color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
            border-bottom: 1px solid #334155;
        }
        .contact-table td {
            padding: 0.75rem 1rem; border-bottom: 1px solid #1e293b;
            font-size: 0.875rem;
        }
        .contact-table tr:hover { background: #1e293b; cursor: pointer; }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%; background: #3b82f6;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 600; color: white; margin-right: 0.75rem;
            vertical-align: middle;
        }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 500;
        }
        .badge.new { background: #1e3a5f; color: #38bdf8; }
        .badge.contacted { background: #1a3330; color: #34d399; }
        .badge.qualified { background: #3b2f1a; color: #fbbf24; }
        .badge.proposal { background: #2d1b4e; color: #a78bfa; }
        .badge.won { background: #14532d; color: #22c55e; }
        .badge.lost { background: #450a0a; color: #f87171; }
        .badge.negotiation { background: #3b2f1a; color: #fb923c; }

        .source-icon { font-size: 0.75rem; color: #64748b; }

        /* Buttons */
        .btn {
            padding: 0.5rem 1rem; border: none; border-radius: 8px;
            font-size: 0.875rem; font-weight: 600; cursor: pointer;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline {
            background: transparent; border: 1px solid #475569; color: #e2e8f0;
        }
        .btn-outline:hover { border-color: #3b82f6; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 2rem; width: 500px; max-width: 90vw; max-height: 85vh;
            overflow-y: auto;
        }
        .modal h2 { margin-bottom: 1.5rem; font-size: 1.25rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block; font-size: 0.8125rem; color: #94a3b8; margin-bottom: 0.25rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0f172a; border: 1px solid #475569;
            border-radius: 8px; padding: 0.625rem; color: #e2e8f0;
            font-size: 0.875rem; outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3b82f6; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }

        /* Toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; background: #22c55e;
            color: white; padding: 0.75rem 1.5rem; border-radius: 8px;
            font-weight: 600; z-index: 200; display: none;
        }
        .toast.error { background: #dc2626; }
        .toast.show { display: block; }

        /* Tabs */
        .tab-bar { display: flex; gap: 0; margin-bottom: 1.5rem; }
        .tab {
            padding: 0.625rem 1.25rem; background: transparent; border: 1px solid #334155;
            color: #94a3b8; font-size: 0.875rem; cursor: pointer;
        }
        .tab:first-child { border-radius: 8px 0 0 8px; }
        .tab:last-child { border-radius: 0 8px 8px 0; }
        .tab.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* ======= Kanban Pipeline ======= */
        .kanban {
            display: flex; gap: 0.75rem; overflow-x: auto; padding-bottom: 1rem;
            height: calc(100vh - 250px); min-height: 400px;
        }
        .kanban-col {
            min-width: 260px; width: 260px; flex-shrink: 0;
            background: #1e293b; border: 1px solid #334155; border-radius: 10px;
            display: flex; flex-direction: column; max-height: 100%;
        }
        .kanban-col-header {
            padding: 0.75rem 1rem; border-bottom: 1px solid #334155;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .kanban-col-header .col-title {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .kanban-col-header .col-dot {
            width: 10px; height: 10px; border-radius: 50%;
        }
        .kanban-col-header h4 {
            font-size: 0.8125rem; text-transform: uppercase; letter-spacing: 0.04em;
            color: #e2e8f0; font-weight: 600;
        }
        .kanban-col-header .col-count {
            font-size: 0.75rem; color: #64748b; background: #334155;
            padding: 1px 7px; border-radius: 10px; margin-left: 0.375rem;
        }
        .kanban-col-header .col-value {
            font-size: 0.6875rem; color: #64748b; display: block; margin-top: 2px;
        }
        .kanban-col-header .col-add {
            background: none; border: 1px solid #475569; color: #94a3b8;
            width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            line-height: 1; transition: all 0.15s;
        }
        .kanban-col-header .col-add:hover {
            background: #334155; color: #e2e8f0; border-color: #3b82f6;
        }
        .kanban-col-body {
            flex: 1; overflow-y: auto; padding: 0.5rem; min-height: 60px;
        }
        .kanban-col-body.drag-over {
            background: rgba(59, 130, 246, 0.08);
            outline: 2px dashed #3b82f6; outline-offset: -4px;
            border-radius: 0 0 10px 10px;
        }

        /* Deal card */
        .deal-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 0.75rem; margin-bottom: 0.5rem; cursor: grab;
            transition: box-shadow 0.15s, border-color 0.15s, opacity 0.15s, transform 0.15s;
            position: relative;
        }
        .deal-card:hover { border-color: #475569; }
        .deal-card:active { cursor: grabbing; }
        .deal-card.dragging {
            opacity: 0.4; transform: scale(0.97);
        }
        .deal-card .card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .deal-card .card-title {
            font-weight: 600; font-size: 0.875rem; color: #e2e8f0;
            line-height: 1.3; flex: 1; margin-right: 0.5rem;
        }
        .deal-card .card-actions {
            display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s;
        }
        .deal-card:hover .card-actions { opacity: 1; }
        .deal-card .card-actions button {
            background: none; border: none; color: #64748b; cursor: pointer;
            padding: 2px 4px; border-radius: 4px; font-size: 0.8125rem;
        }
        .deal-card .card-actions button:hover { color: #e2e8f0; background: #334155; }
        .deal-card .card-actions button.delete-btn:hover { color: #f87171; background: #3b1111; }
        .deal-card .card-contact {
            font-size: 0.75rem; color: #94a3b8; margin-top: 0.375rem;
            display: flex; align-items: center; gap: 0.375rem;
        }
        .deal-card .card-contact .contact-avatar {
            width: 18px; height: 18px; border-radius: 50%; background: #334155;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.5625rem; font-weight: 600; color: #94a3b8; flex-shrink: 0;
        }
        .deal-card .card-value {
            font-size: 0.8125rem; font-weight: 700; color: #22c55e; margin-top: 0.5rem;
        }
        .deal-card .card-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 0.5rem; font-size: 0.6875rem; color: #64748b;
        }
        .deal-card .card-address {
            font-size: 0.6875rem; color: #64748b; margin-top: 0.375rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Deal modal (edit/view) */
        .deal-modal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
        }
        .deal-modal-full { grid-column: 1 / -1; }

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; max-height: 200px; overflow-y: auto; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .kanban { height: auto; min-height: 300px; }
            .kanban-col { min-width: 220px; width: 220px; }
        }
    </style>
</head>
<body>
    <nav>
        <span class="brand">CertiHomes</span>
        <a href="/">Chat</a>
        <a href="/crm" class="active">CRM</a>
        <span class="spacer"></span>
        <div class="nav-actions">
            <button class="btn btn-outline btn-sm" onclick="importGmail()">Import Gmail</button>
            <button class="btn btn-primary btn-sm" onclick="showAddContact()">+ Contact</button>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search contacts..." oninput="debounceSearch()"/>
            </div>
            <div class="filter-section">
                <h3>Status</h3>
                <button class="filter-btn active" data-status="" onclick="filterStatus(this)">
                    All <span class="count" id="countAll">0</span>
                </button>
                <button class="filter-btn" data-status="new" onclick="filterStatus(this)">
                    New <span class="count" id="countNew">0</span>
                </button>
                <button class="filter-btn" data-status="contacted" onclick="filterStatus(this)">
                    Contacted <span class="count" id="countContacted">0</span>
                </button>
                <button class="filter-btn" data-status="qualified" onclick="filterStatus(this)">
                    Qualified <span class="count" id="countQualified">0</span>
                </button>
                <button class="filter-btn" data-status="proposal" onclick="filterStatus(this)">
                    Proposal <span class="count" id="countProposal">0</span>
                </button>
                <button class="filter-btn" data-status="won" onclick="filterStatus(this)">
                    Won <span class="count" id="countWon">0</span>
                </button>
                <button class="filter-btn" data-status="lost" onclick="filterStatus(this)">
                    Lost <span class="count" id="countLost">0</span>
                </button>
            </div>
            <div class="filter-section">
                <h3>Source</h3>
                <button class="filter-btn" data-source="gmail" onclick="filterSource(this)">Gmail</button>
                <button class="filter-btn" data-source="phone" onclick="filterSource(this)">Phone</button>
                <button class="filter-btn" data-source="website" onclick="filterSource(this)">Website</button>
                <button class="filter-btn" data-source="ai_assistant" onclick="filterSource(this)">AI Assistant</button>
            </div>
        </aside>

        <main class="main">
            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <div class="label">Total Contacts</div>
                    <div class="value blue" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">New Leads</div>
                    <div class="value green" id="statNew">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">In Pipeline</div>
                    <div class="value yellow" id="statPipeline">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Pipeline Value</div>
                    <div class="value purple" id="statValue">$0</div>
                </div>
            </div>

            <!-- View toggle -->
            <div class="tab-bar">
                <button class="tab active" onclick="switchView('list', this)">List</button>
                <button class="tab" onclick="switchView('pipeline', this)">Pipeline</button>
            </div>

            <!-- List view -->
            <div id="listView">
                <table class="contact-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Source</th>
                            <th>Added</th>
                        </tr>
                    </thead>
                    <tbody id="contactTableBody"></tbody>
                </table>
            </div>

            <!-- Pipeline Kanban view -->
            <div id="pipelineView" style="display:none;">
                <div class="kanban" id="kanbanBoard"></div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Contact Modal -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal">
            <h2 id="modalTitle">Add Contact</h2>
            <input type="hidden" id="editContactId"/>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" required/>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName"/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email"/>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="phone"/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="company"/>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title"/>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city"/>
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="state"/>
                </div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="new">New</option>
                    <option value="contacted">Contacted</option>
                    <option value="qualified">Qualified</option>
                    <option value="proposal">Proposal</option>
                    <option value="negotiation">Negotiation</option>
                    <option value="won">Won</option>
                    <option value="lost">Lost</option>
                </select>
            </div>
            <div class="form-group">
                <label>Interest / Notes</label>
                <textarea id="interest" rows="3" style="resize:vertical;"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Budget Min ($)</label>
                    <input type="number" id="budgetMin"/>
                </div>
                <div class="form-group">
                    <label>Budget Max ($)</label>
                    <input type="number" id="budgetMax"/>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveContact()">Save</button>
            </div>
        </div>
    </div>

    <!-- Deal Modal (Create / Edit) -->
    <div class="modal-overlay" id="dealModal">
        <div class="modal">
            <h2 id="dealModalTitle">New Deal</h2>
            <input type="hidden" id="editDealId"/>
            <input type="hidden" id="dealStage"/>
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="dealTitle" placeholder="e.g. 123 Main St Purchase"/>
            </div>
            <div class="form-group">
                <label>Contact *</label>
                <select id="dealContact">
                    <option value="">-- Select contact --</option>
                </select>
            </div>
            <div class="deal-modal-grid">
                <div class="form-group">
                    <label>Value ($)</label>
                    <input type="number" id="dealValue" placeholder="500000"/>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="dealStatus">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="qualified">Qualified</option>
                        <option value="proposal">Proposal</option>
                        <option value="negotiation">Negotiation</option>
                        <option value="won">Won</option>
                        <option value="lost">Lost</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Property Address</label>
                <input type="text" id="dealAddress" placeholder="123 Main St, Edison, NJ 08817"/>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea id="dealNotes" rows="3" style="resize:vertical;" placeholder="Deal notes..."></textarea>
            </div>
            <div class="modal-actions">
                <span id="dealDeleteWrap" style="margin-right:auto; display:none;">
                    <button class="btn btn-danger btn-sm" onclick="deleteDeal()">Delete Deal</button>
                </span>
                <button class="btn btn-outline" onclick="closeDealModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveDeal()">Save Deal</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/crm';
        let currentStatus = '';
        let currentSource = '';
        let searchQuery = '';
        let searchTimeout;
        let allContacts = []; // cached for deal contact dropdown

        // Stage config
        const STAGES = [
            { key: 'new',         label: 'New',         color: '#3b82f6' },
            { key: 'contacted',   label: 'Contacted',   color: '#06b6d4' },
            { key: 'qualified',   label: 'Qualified',   color: '#eab308' },
            { key: 'proposal',    label: 'Proposal',    color: '#f97316' },
            { key: 'negotiation', label: 'Negotiation', color: '#a855f7' },
            { key: 'won',         label: 'Won',         color: '#22c55e' },
            { key: 'lost',        label: 'Lost',        color: '#6b7280' },
        ];

        // Drag state
        let dragDealId = null;
        let dragSourceStage = null;

        // Load on page ready
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadContacts();
            // Check for toast from redirect
            const params = new URLSearchParams(location.search);
            if (params.get('toast')) showToast(params.get('toast'));
        });

        // ---- Stats ----
        async function loadStats() {
            const r = await fetch(`${API}/stats`);
            const d = await r.json();
            document.getElementById('statTotal').textContent = d.total_contacts;
            document.getElementById('statNew').textContent = d.by_status.new || 0;
            const pipeline = (d.by_status.contacted||0) + (d.by_status.qualified||0) +
                           (d.by_status.proposal||0) + (d.by_status.negotiation||0);
            document.getElementById('statPipeline').textContent = pipeline;
            document.getElementById('statValue').textContent = '$' + (d.active_pipeline_value || 0).toLocaleString();

            document.getElementById('countAll').textContent = d.total_contacts;
            document.getElementById('countNew').textContent = d.by_status.new || 0;
            document.getElementById('countContacted').textContent = d.by_status.contacted || 0;
            document.getElementById('countQualified').textContent = d.by_status.qualified || 0;
            document.getElementById('countProposal').textContent = d.by_status.proposal || 0;
            document.getElementById('countWon').textContent = d.by_status.won || 0;
            document.getElementById('countLost').textContent = d.by_status.lost || 0;
        }

        // ---- Contacts ----
        async function loadContacts() {
            let url = `${API}/contacts?limit=100`;
            if (searchQuery) url += `&q=${encodeURIComponent(searchQuery)}`;
            if (currentStatus) url += `&status=${currentStatus}`;
            if (currentSource) url += `&source=${currentSource}`;

            const r = await fetch(url);
            const d = await r.json();
            allContacts = d.contacts;
            renderTable(d.contacts);
        }

        function renderTable(contacts) {
            const tbody = document.getElementById('contactTableBody');
            tbody.innerHTML = contacts.map(c => `
                <tr onclick="editContact(${c.id})">
                    <td>
                        <span class="avatar">${(c.first_name[0]||'')+(c.last_name[0]||'')}</span>
                        ${c.full_name}
                    </td>
                    <td>${c.email || '-'}</td>
                    <td>${c.phone || '-'}</td>
                    <td><span class="badge ${c.status}">${c.status}</span></td>
                    <td><span class="source-icon">${c.source}</span></td>
                    <td>${new Date(c.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        // ---- Kanban Pipeline ----
        async function loadPipeline() {
            try {
                const r = await fetch(`${API}/pipeline`);
                const d = await r.json();
                renderKanban(d.stages);
            } catch (e) {
                console.error('Failed to load pipeline:', e);
            }
        }

        function renderKanban(stages) {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';

            STAGES.forEach(stage => {
                const deals = stages[stage.key] || [];
                const totalValue = deals.reduce((s, d) => s + (d.value || 0), 0);

                const col = document.createElement('div');
                col.className = 'kanban-col';
                col.dataset.stage = stage.key;

                col.innerHTML = `
                    <div class="kanban-col-header">
                        <div>
                            <div class="col-title">
                                <span class="col-dot" style="background:${stage.color}"></span>
                                <h4>${stage.label}</h4>
                                <span class="col-count">${deals.length}</span>
                            </div>
                            <span class="col-value">${totalValue > 0 ? '$' + totalValue.toLocaleString() : ''}</span>
                        </div>
                        <button class="col-add" onclick="showAddDeal('${stage.key}')" title="Add deal">+</button>
                    </div>
                    <div class="kanban-col-body" data-stage="${stage.key}"></div>
                `;

                const body = col.querySelector('.kanban-col-body');

                // Drop zone events
                body.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    body.classList.add('drag-over');
                });
                body.addEventListener('dragleave', e => {
                    if (!body.contains(e.relatedTarget)) {
                        body.classList.remove('drag-over');
                    }
                });
                body.addEventListener('drop', e => {
                    e.preventDefault();
                    body.classList.remove('drag-over');
                    const dealId = e.dataTransfer.getData('text/plain');
                    const newStage = body.dataset.stage;
                    if (dealId && newStage !== dragSourceStage) {
                        moveDeal(parseInt(dealId), newStage);
                    }
                });

                // Render deal cards
                deals.forEach(deal => {
                    body.appendChild(createDealCard(deal));
                });

                board.appendChild(col);
            });
        }

        function createDealCard(deal) {
            const card = document.createElement('div');
            card.className = 'deal-card';
            card.draggable = true;
            card.dataset.dealId = deal.id;

            const daysAgo = Math.floor((Date.now() - new Date(deal.created_at).getTime()) / 86400000);
            const daysLabel = daysAgo === 0 ? 'Today' : daysAgo === 1 ? '1 day ago' : `${daysAgo}d ago`;
            const initials = deal.contact_name ? deal.contact_name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase() : '?';

            card.innerHTML = `
                <div class="card-top">
                    <div class="card-title">${escHtml(deal.title)}</div>
                    <div class="card-actions">
                        <button onclick="event.stopPropagation(); showEditDeal(${deal.id})" title="Edit">&#9998;</button>
                        <button class="delete-btn" onclick="event.stopPropagation(); confirmDeleteDeal(${deal.id}, '${escAttr(deal.title)}')" title="Delete">&#128465;</button>
                    </div>
                </div>
                <div class="card-contact">
                    <span class="contact-avatar">${initials}</span>
                    ${escHtml(deal.contact_name || 'No contact')}
                </div>
                ${deal.value ? `<div class="card-value">$${deal.value.toLocaleString()}</div>` : ''}
                ${deal.property_address ? `<div class="card-address">${escHtml(deal.property_address)}</div>` : ''}
                <div class="card-meta">
                    <span>${daysLabel}</span>
                    ${deal.mls_id ? `<span>MLS# ${escHtml(deal.mls_id)}</span>` : ''}
                </div>
            `;

            // Drag events
            card.addEventListener('dragstart', e => {
                dragDealId = deal.id;
                dragSourceStage = deal.status;
                e.dataTransfer.setData('text/plain', deal.id.toString());
                e.dataTransfer.effectAllowed = 'move';
                requestAnimationFrame(() => card.classList.add('dragging'));
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                dragDealId = null;
                dragSourceStage = null;
                // Remove any lingering drag-over
                document.querySelectorAll('.kanban-col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
            });

            // Click to edit
            card.addEventListener('click', () => showEditDeal(deal.id));

            return card;
        }

        async function moveDeal(dealId, newStatus) {
            try {
                await fetch(`${API}/deals/${dealId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                showToast(`Deal moved to ${newStatus}`);
                loadPipeline();
                loadStats();
            } catch (e) {
                showToast('Failed to move deal', true);
            }
        }

        // ---- Deal Modal (Create) ----
        function showAddDeal(stage) {
            document.getElementById('dealModalTitle').textContent = 'New Deal';
            document.getElementById('editDealId').value = '';
            document.getElementById('dealTitle').value = '';
            document.getElementById('dealValue').value = '';
            document.getElementById('dealAddress').value = '';
            document.getElementById('dealNotes').value = '';
            document.getElementById('dealStatus').value = stage || 'new';
            document.getElementById('dealDeleteWrap').style.display = 'none';
            populateContactDropdown();
            document.getElementById('dealModal').classList.add('show');
        }

        async function showEditDeal(dealId) {
            try {
                const r = await fetch(`${API}/deals/${dealId}`);
                const deal = await r.json();
                document.getElementById('dealModalTitle').textContent = 'Edit Deal';
                document.getElementById('editDealId').value = deal.id;
                document.getElementById('dealTitle').value = deal.title;
                document.getElementById('dealValue').value = deal.value || '';
                document.getElementById('dealAddress').value = deal.property_address || '';
                document.getElementById('dealNotes').value = deal.notes || '';
                document.getElementById('dealStatus').value = deal.status;
                document.getElementById('dealDeleteWrap').style.display = '';
                populateContactDropdown(deal.contact_id);
                document.getElementById('dealModal').classList.add('show');
            } catch (e) {
                showToast('Failed to load deal', true);
            }
        }

        function populateContactDropdown(selectedId) {
            const sel = document.getElementById('dealContact');
            sel.innerHTML = '<option value="">-- Select contact --</option>';
            allContacts.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.full_name}${c.email ? ' (' + c.email + ')' : ''}`;
                if (selectedId && c.id === selectedId) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function closeDealModal() {
            document.getElementById('dealModal').classList.remove('show');
        }

        async function saveDeal() {
            const id = document.getElementById('editDealId').value;
            const title = document.getElementById('dealTitle').value.trim();
            const contactId = document.getElementById('dealContact').value;
            const value = parseFloat(document.getElementById('dealValue').value) || null;
            const status = document.getElementById('dealStatus').value;
            const address = document.getElementById('dealAddress').value.trim() || null;
            const notes = document.getElementById('dealNotes').value.trim() || null;

            if (!title) { showToast('Title is required', true); return; }
            if (!contactId && !id) { showToast('Contact is required', true); return; }

            try {
                if (id) {
                    // Update existing deal
                    await fetch(`${API}/deals/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, value, status, property_address: address, notes })
                    });
                    showToast('Deal updated');
                } else {
                    // Create new deal
                    const payload = { contact_id: parseInt(contactId), title, value, status, property_address: address, notes };
                    await fetch(`${API}/deals`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    showToast('Deal created');
                }
                closeDealModal();
                loadPipeline();
                loadStats();
            } catch (e) {
                showToast('Failed to save deal', true);
            }
        }

        function confirmDeleteDeal(dealId, title) {
            if (confirm(`Delete deal "${title}"?`)) {
                deleteDealById(dealId);
            }
        }

        async function deleteDeal() {
            const id = document.getElementById('editDealId').value;
            if (!id) return;
            if (!confirm('Delete this deal?')) return;
            await deleteDealById(parseInt(id));
            closeDealModal();
        }

        async function deleteDealById(dealId) {
            try {
                await fetch(`${API}/deals/${dealId}`, { method: 'DELETE' });
                showToast('Deal deleted');
                loadPipeline();
                loadStats();
            } catch (e) {
                showToast('Failed to delete deal', true);
            }
        }

        // ---- Filters ----
        function filterStatus(btn) {
            document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStatus = btn.dataset.status;
            currentSource = '';
            document.querySelectorAll('[data-source]').forEach(b => b.classList.remove('active'));
            loadContacts();
        }

        function filterSource(btn) {
            document.querySelectorAll('[data-source]').forEach(b => b.classList.remove('active'));
            btn.classList.toggle('active');
            currentSource = btn.classList.contains('active') ? btn.dataset.source : '';
            loadContacts();
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = document.getElementById('searchInput').value;
                loadContacts();
            }, 300);
        }

        // ---- View toggle ----
        function switchView(view, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('listView').style.display = view === 'list' ? '' : 'none';
            document.getElementById('pipelineView').style.display = view === 'pipeline' ? '' : 'none';
            if (view === 'pipeline') {
                loadPipeline();
            }
        }

        // ---- Contact Modal ----
        function showAddContact() {
            document.getElementById('modalTitle').textContent = 'Add Contact';
            document.getElementById('editContactId').value = '';
            ['firstName','lastName','email','phone','company','title','city','state','interest','budgetMin','budgetMax'].forEach(
                id => document.getElementById(id).value = ''
            );
            document.getElementById('status').value = 'new';
            document.getElementById('contactModal').classList.add('show');
        }

        async function editContact(id) {
            const r = await fetch(`${API}/contacts/${id}`);
            const c = await r.json();
            document.getElementById('modalTitle').textContent = 'Edit Contact';
            document.getElementById('editContactId').value = c.id;
            document.getElementById('firstName').value = c.first_name;
            document.getElementById('lastName').value = c.last_name || '';
            document.getElementById('email').value = c.email || '';
            document.getElementById('phone').value = c.phone || '';
            document.getElementById('company').value = c.company || '';
            document.getElementById('title').value = c.title || '';
            document.getElementById('city').value = c.city || '';
            document.getElementById('state').value = c.state || '';
            document.getElementById('status').value = c.status;
            document.getElementById('interest').value = c.interest || '';
            document.getElementById('budgetMin').value = c.budget_min || '';
            document.getElementById('budgetMax').value = c.budget_max || '';
            document.getElementById('contactModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('contactModal').classList.remove('show');
        }

        async function saveContact() {
            const id = document.getElementById('editContactId').value;
            const payload = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value || null,
                phone: document.getElementById('phone').value || null,
                company: document.getElementById('company').value || null,
                title: document.getElementById('title').value || null,
                city: document.getElementById('city').value || null,
                state: document.getElementById('state').value || null,
                status: document.getElementById('status').value,
                interest: document.getElementById('interest').value || null,
                budget_min: parseInt(document.getElementById('budgetMin').value) || null,
                budget_max: parseInt(document.getElementById('budgetMax').value) || null,
            };

            const url = id ? `${API}/contacts/${id}` : `${API}/contacts`;
            const method = id ? 'PATCH' : 'POST';
            await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });

            closeModal();
            showToast(id ? 'Contact updated' : 'Contact created');
            loadStats();
            loadContacts();
        }

        async function importGmail() {
            const r = await fetch(`${API}/gmail/status`);
            const d = await r.json();
            if (!d.connected) {
                window.location.href = '/api/crm/gmail/auth';
                return;
            }
            showToast('Importing Gmail contacts...');
            const resp = await fetch(`${API}/gmail/import`, {method:'POST'});
            const result = await resp.json();
            showToast(`Imported ${result.imported} contacts, updated ${result.updated}`);
            loadStats();
            loadContacts();
        }

        // ---- Utilities ----
        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function escAttr(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }
    </script>
</body>
</html>
